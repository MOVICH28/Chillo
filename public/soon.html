<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pumpdora — Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',monospace;padding:3rem 2rem;position:relative;overflow:hidden;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes loader{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.cursor{display:inline-block;width:8px;height:14px;background:#22c55e;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;}
.scanline{position:absolute;left:0;right:0;height:1px;background:rgba(34,197,94,0.03);animation:scanline 6s linear infinite;pointer-events:none;}
.a1{animation:fadeUp 0.6s ease 0.1s forwards;opacity:0;}
.a2{animation:fadeUp 0.6s ease 0.4s forwards;opacity:0;}
.a3{animation:fadeUp 0.6s ease 0.8s forwards;opacity:0;}
.a4{animation:fadeUp 0.6s ease 1.2s forwards;opacity:0;}
.a5{animation:fadeUp 0.6s ease 1.6s forwards;opacity:0;}
.loader-inner{animation:loader 2s ease-in-out infinite;}
.feature{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid #111;}
.feature:last-child{border-bottom:none;}
.dot{width:4px;height:4px;border-radius:50%;background:#22c55e;min-width:4px;margin-top:6px;}
.feat-title{font-size:13px;color:#fff;font-family:sans-serif;font-weight:500;margin-bottom:2px;}
.feat-sub{font-size:11px;color:#333;font-family:sans-serif;}
a:hover{color:#22c55e!important;}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="a1" style="margin-bottom:0.6rem;">
  <img src="/logo2.png" alt="Pumpdora" style="height:46px;object-fit:contain;"/>
</div>
<div class="a2" style="text-align:center;margin-bottom:2.5rem;">
  <div style="font-size:18px;color:#888;font-family:sans-serif;letter-spacing:0.02em;">New era of <span style="color:#fff;font-weight:500;">Prediction Markets</span></div>
</div>
<div class="a3" style="width:300px;margin-bottom:2.5rem;">
  <div class="feature">
    <div class="dot"></div>
    <div>
      <div class="feat-title">Anyone can create a market</div>
      <div class="feat-sub">Launch your own prediction in seconds</div>
    </div>
  </div>
  <div class="feature">
    <div class="dot"></div>
    <div>
      <div class="feat-title">Trade your predictions</div>
      <div class="feat-sub">Bet on outcomes, win, and profit</div>
    </div>
  </div>
  <div class="feature">
    <div class="dot"></div>
    <div>
      <div class="feat-title">Earn commissions</div>
      <div class="feat-sub">Get a share from every trade in your market</div>
    </div>
  </div>
</div>
<div class="a4" style="width:300px;margin-bottom:2.5rem;">
  <div style="height:1px;background:#111;position:relative;overflow:hidden;">
    <div class="loader-inner" style="position:absolute;top:0;left:0;width:80px;height:100%;background:linear-gradient(90deg,transparent,#22c55e,transparent);"></div>
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:8px;">
    <span style="font-size:10px;color:#1e1e1e;letter-spacing:0.1em;">UNDER CONSTRUCTION</span>
    <span style="font-size:10px;color:#1e1e1e;letter-spacing:0.1em;">SOON<span class="cursor"></span></span>
  </div>
</div>
<div class="a5" style="text-align:center;">
  <div style="display:flex;gap:24px;justify-content:center;align-items:center;">
    <a href="https://x.com/pumpdora" style="color:#2a2a2a;font-size:11px;text-decoration:none;letter-spacing:0.05em;display:flex;align-items:center;gap:6px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.733-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      @pumpdora
    </a>
    <span style="color:#111;">|</span>
    <a href="mailto:pumpdora@gmail.com" style="color:#2a2a2a;font-size:11px;text-decoration:none;letter-spacing:0.05em;">
      pumpdora@gmail.com
    </a>
  </div>
</div>
<div style="position:absolute;bottom:16px;font-size:10px;color:#161616;letter-spacing:0.12em;">
  pumpdora.com
</div>
</body>
</html>
